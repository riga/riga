name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  create_cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=riga&show_icons=true&include_all_commits=true&hide_title=true&hide_border=true&theme=nord
          path: assets/stats.svg
          token: ${{ secrets.PAT }}

      - name: Generate langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=riga&layout=compact&hide_border=true&hide_title=false&card_width=340&theme=nord
          path: assets/langs.svg
          token: ${{ secrets.PAT }}

      - name: Commit cards
        run: |
          git lfs install
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "Update README cards." || exit 0
          git push
